name: 🔄 Supabase Keep-Alive

on:
  schedule:
    - cron: '0 7 * * 1'   # Lundi 07:00 UTC
    - cron: '0 7 * * 4'   # Jeudi 07:00 UTC
  workflow_dispatch:       # Déclenchement manuel possible

jobs:
  ping:
    name: Ping all Supabase projects
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check secret is set
        run: |
          if [ -z "${{ secrets.SUPABASE_PROJECTS }}" ]; then
            echo "❌  Le secret SUPABASE_PROJECTS n'est pas configuré."
            exit 1
          fi

      - name: Ping each project
        env:
          SUPABASE_PROJECTS: ${{ secrets.SUPABASE_PROJECTS }}
        run: |
          set -euo pipefail

          SUCCESS=0
          FAIL=0
          TOTAL=$(echo "$SUPABASE_PROJECTS" | jq 'length')

          echo "📋  $TOTAL projet(s) à pinger"
          echo "─────────────────────────────────────────"

          while IFS= read -r project; do
            NAME=$(echo "$project" | jq -r '.name')
            URL=$(echo "$project"  | jq -r '.url' | sed 's:/*$::')
            KEY=$(echo "$project"  | jq -r '.key')

            printf "🔁  %-30s  " "[$NAME]"

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 20 \
              -H "apikey: $KEY" \
              -H "Authorization: Bearer $KEY" \
              "$URL/rest/v1/")

            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "✅  HTTP $HTTP_STATUS"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "⚠️   HTTP $HTTP_STATUS  ← vérifier l'URL et la clé"
              FAIL=$((FAIL + 1))
            fi

          done < <(echo "$SUPABASE_PROJECTS" | jq -c '.[]')

          echo "─────────────────────────────────────────"
          echo "Résultat : ✅ $SUCCESS succès  /  ❌ $FAIL échec(s)"

          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi
